version: '3'
services:
  estonia-redis:
        image: redis:7-alpine
        restart: always
        command: ["redis-server", "--save", "", "--appendonly", "no"]
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 1s
            timeout: 3s
            retries: 50
        ports:
            - 6380:6379
